server:
  port: ${PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlite:./data/customermap.db?charset=utf8}
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: none # SQLite verwendet dynamische Typisierung und Hibernate validiert deshalb bei Long-Feldern falsch.
                     # Bei PostgreSQL im Produktivbetrieb validate nutzen.
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
